# Shared tmux defaults based on the remote smux setup.
# Clipboard bindings live in ~/.tmux.conf.local so chezmoi can render the
# helper path per host.

set -g mouse on
set -g history-limit 10000
set -g status-keys vi
set -g mode-keys vi
set -g set-titles on
set -g set-titles-string "#I: #T"
set -g base-index 1
setw -g pane-base-index 1
set -g allow-passthrough on
set -g allow-rename off

# Scroll enters copy mode automatically, exits when you reach the bottom.
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Pane navigation (no prefix needed, Option+ijkl, no wrap).
bind -n M-j if -F '#{pane_at_left}' '' 'select-pane -L'
bind -n M-l if -F '#{pane_at_right}' '' 'select-pane -R'
bind -n M-i if -F '#{pane_at_top}' '' 'select-pane -U'
bind -n M-k if -F '#{pane_at_bottom}' '' 'select-pane -D'

# Pane management (no prefix needed).
bind -n M-n split-window -h \; select-layout tiled
bind -n M-w kill-pane
bind -n M-o next-layout
bind -n M-g select-pane -m
bind -n M-y run 'tmux swap-pane -s \{marked\} && tmux select-pane -M'

# Window navigation (Option+u = next, Option+h = previous).
bind -n M-u if -F '#{window_end_flag}' '' 'next-window'
bind -n M-h if -F '#{window_start_flag}' '' 'previous-window'
bind -n M-m new-window

# Scroll mode: Option+Tab to enter, i/k to scroll, q or Escape to exit.
bind -n M-Tab if -F '#{pane_in_mode}' 'send-keys -X cancel' 'copy-mode'
bind -T copy-mode i send-keys -X -N 2 scroll-up
bind -T copy-mode k send-keys -X -N 2 scroll-down
bind -T copy-mode I send-keys -X halfpage-up
bind -T copy-mode K send-keys -X halfpage-down
bind -T copy-mode-vi i send-keys -X -N 2 scroll-up
bind -T copy-mode-vi k send-keys -X -N 2 scroll-down
bind -T copy-mode-vi I send-keys -X halfpage-up
bind -T copy-mode-vi K send-keys -X halfpage-down
bind -T copy-mode q send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel

# Red pane borders with full box around each pane.
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=red
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g pane-border-format " #{?@name,#{@name},#{b:pane_current_path}} "
set -g pane-border-status top

# Status bar showing window number and name.
set -g status on
set -g status-style bg=default,fg=colour245
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style fg=red,bold
set -g status-left ""
set -g status-right ""

bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'
