[tools."http:devin"]
version = "latest"
bin_path = "bin"
version_list_url = "https://static.devin.ai/cli/current/manifest.json"
version_expr = "[fromJSON(body).version]"
checksum_url = "https://static.devin.ai/cli/{{version}}/manifest.json"
checksum_expr = '"sha256:" + filter(values(fromJSON(body).platforms), { #.url == url })[0].sha256'

[tools."http:devin".platforms]
linux-arm64 = { url = "https://static.devin.ai/cli/{{version}}/devin-{{version}}-aarch64-unknown-linux.tar.gz" }
linux-x64 = { url = "https://static.devin.ai/cli/{{version}}/devin-{{version}}-x86_64-unknown-linux.tar.gz" }
macos-arm64 = { url = "https://static.devin.ai/cli/{{version}}/devin-{{version}}-aarch64-apple-darwin.tar.gz" }
macos-x64 = { url = "https://static.devin.ai/cli/{{version}}/devin-{{version}}-x86_64-apple-darwin.tar.gz" }


[tools."github:BennyKok/lfg"]
version = "0.1.16"
asset_pattern = "lfg-bundle.tar.gz"
strip_components = 1
bin_path = "bin"
depends = "bun"
postinstall = '''bash -lc 'set -euo pipefail
BUN_BIN="$(mise where bun)/bin/bun"
cd "$MISE_TOOL_INSTALL_PATH"
"$BUN_BIN" install --production --frozen-lockfile
mkdir -p bin
cat > bin/lfg <<'"'"'EOF'"'"'
#!/usr/bin/env bash
set -euo pipefail
DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
if command -v bun >/dev/null 2>&1; then
  BUN_BIN="$(command -v bun)"
elif command -v mise >/dev/null 2>&1; then
  BUN_BIN="$(mise where bun)/bin/bun"
else
  echo "lfg requires bun on PATH (install via mise: mise use -g bun)" >&2
  exit 127
fi
exec "$BUN_BIN" run "$DIR/src/cli.ts" "$@"
EOF
chmod +x bin/lfg' '''

[settings]
minimum_release_age_excludes = [
  "npm:@earendil-works/pi-coding-agent",
  "claude",
  "opencode",
  "npm:droid",
  "codex",
  "amp",
  "github:can1357/oh-my-pi",
]
